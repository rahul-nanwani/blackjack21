name: Targeted tests

run-name: ${{ github.actor }} is running targeted pytest suite

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: test_v5 and game_flow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r tests/requirements.txt

      - name: Run requested tests
        run: |
          pytest tests/test_v5.py tests/test_game_flow.py
