name: Docs build

run-name: ${{ github.actor }} is verifying Sphinx docs

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sphinx:
    name: Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match readthedocs.yaml (importing the package needs 3.10+)
          python-version: "3.11"

      - name: Install documentation dependencies
        run: |
          python -m pip install -U pip
          # Sphinx is provided by Read the Docs; install explicitly in CI.
          python -m pip install sphinx -r docs/requirements.txt

      - name: Build HTML (same layout as Read the Docs)
        run: python -m sphinx -b html docs docs/_build
